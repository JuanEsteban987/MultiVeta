<!DOCTYPE html>
<html>
<head>
    <title>Editor de Nodos para Juego</title>
    <script src="https://cdn.jsdelivr.net/npm/litegraph.js"></script>
    <style>
        #editor { width: 60%; height: 500px; float: left; }
        #gameCanvas { width: 40%; height: 500px; float: right; background: #222; }
    </style>
</head>
<body>
    <div id="editor"></div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        // Configurar el editor
        var graph = new LGraph();
        var canvas = new LGraphCanvas("#editor", graph);

        // Variable global para el estado del juego
        let gameState = {
            x: 200,
            y: 250,
            speed: 5
        };

        // Dibujar el juego en el canvas
        const ctx = document.getElementById('gameCanvas').getContext('2d');
        function drawGame() {
            ctx.clearRect(0, 0, 400, 500);
            ctx.fillStyle = 'red';
            ctx.fillRect(gameState.x, gameState.y, 30, 30);
            requestAnimationFrame(drawGame);
        }
        drawGame();

        // Nodo personalizado: Mover derecha
        function MoverDerecha() {
            this.addInput("in", LiteGraph.ACTION);
            this.addOutput("out", LiteGraph.EVENT);
            this.addProperty("incremento", 5);
        }
        MoverDerecha.prototype.onExecute = function() {
            gameState.x += this.properties.incremento;
            this.triggerSlot(0); // Activar salida
        };
        LiteGraph.registerNodeType("juego/moverDerecha", MoverDerecha);

        // Nodo de inicio (evento)
        function Inicio() {
            this.addOutput("out", LiteGraph.EVENT);
        }
        Inicio.prototype.onExecute = function() {
            this.triggerSlot(0);
        };
        LiteGraph.registerNodeType("eventos/inicio", Inicio);

        // Crear nodos iniciales
        var inicio = LiteGraph.createNode("eventos/inicio");
        var mover = LiteGraph.createNode("juego/moverDerecha");
        graph.add(inicio);
        graph.add(mover);
        inicio.connect(0, mover, 0);

        // Botón para ejecutar el grafo manualmente
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                graph.start(); // Ejecuta todos los nodos
            }
        });
    </script>
</body>
</html>
