<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch 2D shooter · survive.io style + P2P</title>
    <!-- PeerJS for WebRTC made simple -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0d0f14;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .twitch-panel {
            background: #18181b;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7), 0 0 0 1px #2f2f35 inset;
            overflow: hidden;
            width: 1100px;
            max-width: 95vw;
            display: flex;
            flex-direction: column;
        }
        /* header — twitch-like gradient */
        .stream-header {
            background: linear-gradient(145deg, #9147ff 0%, #5f2eb0 100%);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }
        .stream-avatar {
            width: 48px;
            height: 48px;
            background: #4b367c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .stream-info {
            flex: 1;
        }
        .stream-info h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }
        .stream-info p {
            margin: 4px 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-badge {
            background: #eb0400;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .connection-bar {
            background: #1f1f23;
            padding: 12px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border-bottom: 1px solid #2f2f35;
        }
        .peer-group {
            display: flex;
            gap: 8px;
            background: #0b0b0e;
            padding: 6px 10px;
            border-radius: 40px;
            border: 1px solid #2e2e35;
            align-items: center;
        }
        .peer-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 12px;
            outline: none;
            width: 160px;
            font-size: 0.9rem;
        }
        .peer-group input::placeholder {
            color: #5a5a6e;
        }
        button {
            background: #3a3a44;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.15s;
            border: 1px solid #5a5a6e;
        }
        button.primary {
            background: #9147ff;
            border-color: #a970ff;
        }
        button.primary:hover {
            background: #7a3ae0;
        }
        button:hover {
            background: #4f4f5c;
        }
        .status {
            margin-left: auto;
            color: #adadb8;
            font-size: 0.9rem;
            background: #25252b;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #3b3b44;
        }
        .game-area {
            display: flex;
            padding: 24px;
            gap: 20px;
            background: #141417;
        }
        .canvas-wrapper {
            flex: 3;
            aspect-ratio: 16/9;
            background: #1e1e24;
            border-radius: 20px;
            border: 3px solid #2f2f37;
            overflow: hidden;
            box-shadow: 0 10px 25px black;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #252a2e;
            cursor: crosshair;
        }
        .twitch-chat {
            flex: 1;
            background: #1b1b1f;
            border-radius: 18px;
            border: 1px solid #2f2f37;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 200px;
        }
        .chat-header {
            background: #212127;
            padding: 15px;
            font-weight: 600;
            border-bottom: 1px solid #2f2f37;
            color: #dedee3;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .chat-header span {
            background: #3a3a48;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.8rem;
        }
        .chat-messages {
            flex: 1;
            padding: 12px;
            color: #b9b9c7;
            font-size: 0.85rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-message {
            border-left: 3px solid #9147ff;
            padding-left: 8px;
        }
        .chat-message .name {
            color: #bf94ff;
            font-weight: 600;
        }
        .controls-note {
            background: #25252b;
            margin: 12px;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.8rem;
            color: #9f9fb5;
        }
    </style>
</head>
<body>
<div class="twitch-panel">
    <!-- stream header (twitch vibe) -->
    <div class="stream-header">
        <div class="stream-avatar">🎮</div>
        <div class="stream-info">
            <h2>survive.io <span style="font-weight:300;">×</span> P2P arena</h2>
            <p><span class="live-badge">LIVE</span> streamer room · direct P2P join</p>
        </div>
    </div>

    <!-- connection controls (P2P) -->
    <div class="connection-bar">
        <div class="peer-group">
            <input type="text" id="hostIdInput" placeholder="streamer id (e.g. ninja)" value="streamer1">
            <button id="hostBtn" class="primary">✨ HOST as streamer</button>
        </div>
        <div class="peer-group">
            <input type="text" id="joinIdInput" placeholder="streamer id to join" value="streamer1">
            <button id="joinBtn">🔌 join room</button>
        </div>
        <div class="status" id="statusDisplay">⚡ disconnected</div>
    </div>

    <!-- main game area + chat mock -->
    <div class="game-area">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="450"></canvas>
        </div>
        <div class="twitch-chat">
            <div class="chat-header">
                💬 STREAM CHAT <span>P2P</span>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message"><span class="name">host:</span> use WASD + left click to shoot</div>
                <div class="chat-message"><span class="name">info:</span> bullets collide, 100hp</div>
            </div>
            <div class="controls-note">
                ←↑↓→ move · 🖱️ aim + click to shoot
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // --------------------------------------------------------------
    //  GLOBAL VARIABLES
    // --------------------------------------------------------------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('statusDisplay');
    const chatDiv = document.getElementById('chatMessages');

    // P2P and networking
    let peer = null;                  // PeerJS instance
    let connections = {};             // active dataConnections (peerId -> DataConnection)
    let isHost = false;
    let myPeerId = null;
    let hostPeerId = null;            // the streamer we are connected to (if client)
    let localConnection = null;        // for client: single connection to host

    // Game state (authoritative on host, mirrored on clients)
    let gameState = {
        players: {},    // peerId -> { x, y, health, color, lastShoot }
        bullets: []     // { x, y, vx, vy, ownerId }
    };

    // Local input (for host and clients)
    const inputState = {
        left: false,
        right: false,
        up: false,
        down: false,
        aimX: 400,      // center of canvas default
        aimY: 225,
        shoot: false
    };

    // Mouse / canvas tracking
    let mouseX = 400, mouseY = 225;
    let mouseDown = false;

    // Game loop (only host runs simulation)
    let lastTimestamp = 0;
    let animationFrame = null;

    // Constants
    const PLAYER_RADIUS = 18;
    const PLAYER_SPEED = 180;          // pixels per second
    const BULLET_RADIUS = 5;
    const BULLET_SPEED = 300;
    const SHOOT_COOLDOWN = 0.15;        // seconds between bullets
    const MAX_HEALTH = 100;

    // helper to add chat-like message
    function addChatMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message';
        msgDiv.innerHTML = `<span class="name">${sender}:</span> ${text}`;
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        if (chatDiv.children.length > 12) {
            chatDiv.removeChild(chatDiv.children[0]);
        }
    }

    // --------------------------------------------------------------
    //  PEERJS & CONNECTION HANDLING
    // --------------------------------------------------------------
    function initializePeer(id = null) {
        if (peer) peer.destroy();
        // using PeerJS cloud server (key: 'lwjd5qra8257b9' is default demo key, but we can use default)
        peer = new Peer(id, {
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            myPeerId = id;
            statusDiv.innerText = `🟢 online: ${id}`;
            addChatMessage('system', `Your peer ID: ${id}`);
            if (isHost) {
                hostPeerId = id;
                // initialize empty connections
                connections = {};
                // start host game loop
                if (animationFrame) cancelAnimationFrame(animationFrame);
                lastTimestamp = performance.now();
                animationFrame = requestAnimationFrame(hostGameLoop);
                addChatMessage('host', 'Streamer mode ON — you are authoritative');
            }
        });

        peer.on('connection', (conn) => {
            // host receives connection from viewer
            if (!isHost) return; // only host accepts
            setupConnection(conn);
        });

        peer.on('error', (err) => {
            console.warn('peer error', err);
            statusDiv.innerText = '⚠️ error: ' + err.type;
        });

        peer.on('disconnected', () => {
            statusDiv.innerText = '🔴 disconnected';
        });
    }

    function setupConnection(conn) {
        const remoteId = conn.peer;
        conn.on('open', () => {
            connections[remoteId] = conn;
            addChatMessage('system', `viewer ${remoteId.slice(0,5)} joined`);
            // if client is new, create a player for them (with random color)
            if (isHost && !gameState.players[remoteId]) {
                gameState.players[remoteId] = {
                    x: Math.random() * 700 + 50,
                    y: Math.random() * 350 + 50,
                    health: MAX_HEALTH,
                    color: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'),
                    lastShoot: 0
                };
            }

            conn.on('data', (data) => {
                handleMessage(remoteId, data);
            });

            conn.on('close', () => {
                delete connections[remoteId];
                delete gameState.players[remoteId];
                addChatMessage('system', `viewer ${remoteId.slice(0,5)} left`);
            });
        });
    }

    function handleMessage(peerId, data) {
        if (data.type === 'input' && isHost) {
            // update input map for this player (host side)
            if (!gameState.players[peerId]) {
                // maybe re-create if not exist? but should exist
                gameState.players[peerId] = gameState.players[peerId] || {
                    x: Math.random()*700+50,
                    y: Math.random()*350+50,
                    health: MAX_HEALTH,
                    color: '#'+Math.floor(Math.random()*16777215).toString(16),
                    lastShoot: 0
                };
            }
            // store input for this peer in a separate map (we'll process per frame)
            if (!inputMap[peerId]) inputMap[peerId] = { aimX: 400, aimY:225, shoot:false, left:false, right:false, up:false, down:false };
            inputMap[peerId].left = data.left;
            inputMap[peerId].right = data.right;
            inputMap[peerId].up = data.up;
            inputMap[peerId].down = data.down;
            inputMap[peerId].aimX = data.aimX;
            inputMap[peerId].aimY = data.aimY;
            inputMap[peerId].shoot = data.shoot;
        }
        else if (data.type === 'shoot' && isHost) {
            // alternative single-shoot event (we'll also use continuous, but just in case)
            if (gameState.players[peerId]) {
                createBullet(peerId, data.aimX, data.aimY);
            }
        }
        else if (data.type === 'state' && !isHost) {
            // client receives world state from host
            gameState = data.state;
        }
    }

    // Host: inputMap for all connected clients (including host itself)
    let inputMap = {}; // peerId -> { left,right,up,down, aimX, aimY, shoot }

    // --------------------------------------------------------------
    //  HOST GAME LOOP (authoritative)
    // --------------------------------------------------------------
    function hostGameLoop(now) {
        if (!isHost) return;
        const dt = Math.min(0.05, (now - (lastTimestamp || now)) / 1000); // max 50ms step
        lastTimestamp = now;

        // 1. Process host's own input (stored in inputMap under myPeerId)
        if (myPeerId) {
            if (!inputMap[myPeerId]) inputMap[myPeerId] = { left:false, right:false, up:false, down:false, aimX:400, aimY:225, shoot:false };
            // copy from global inputState
            inputMap[myPeerId].left = inputState.left;
            inputMap[myPeerId].right = inputState.right;
            inputMap[myPeerId].up = inputState.up;
            inputMap[myPeerId].down = inputState.down;
            inputMap[myPeerId].aimX = inputState.aimX;
            inputMap[myPeerId].aimY = inputState.aimY;
            inputMap[myPeerId].shoot = inputState.shoot;
        }

        // 2. apply movement and shooting for all players with input
        for (let pid in inputMap) {
            const inp = inputMap[pid];
            const player = gameState.players[pid];
            if (!player) continue;

            // movement
            let dx = 0, dy = 0;
            if (inp.left) dx -= 1;
            if (inp.right) dx += 1;
            if (inp.up) dy -= 1;
            if (inp.down) dy += 1;
            if (dx !== 0 || dy !== 0) {
                const len = Math.hypot(dx, dy);
                dx = dx / len * PLAYER_SPEED * dt;
                dy = dy / len * PLAYER_SPEED * dt;
                player.x = Math.min(800 - PLAYER_RADIUS, Math.max(PLAYER_RADIUS, player.x + dx));
                player.y = Math.min(450 - PLAYER_RADIUS, Math.max(PLAYER_RADIUS, player.y + dy));
            }

            // shooting (continuous)
            if (inp.shoot && player.health > 0) {
                const nowSec = performance.now() / 1000;
                if (nowSec - (player.lastShoot || 0) > SHOOT_COOLDOWN) {
                    player.lastShoot = nowSec;
                    createBullet(pid, inp.aimX, inp.aimY);
                }
            }
        }

        // 3. update bullets and collisions
        for (let i = gameState.bullets.length - 1; i >= 0; i--) {
            const b = gameState.bullets[i];
            b.x += b.vx * dt;
            b.y += b.vy * dt;

            // remove if out of bounds
            if (b.x < -20 || b.x > 820 || b.y < -20 || b.y > 470) {
                gameState.bullets.splice(i, 1);
                continue;
            }

            // check collisions with players (except owner)
            for (let pid in gameState.players) {
                if (pid === b.ownerId) continue;
                const p = gameState.players[pid];
                if (!p || p.health <= 0) continue;
                const dist = Math.hypot(b.x - p.x, b.y - p.y);
                if (dist < PLAYER_RADIUS + BULLET_RADIUS) {
                    // hit!
                    p.health -= 25;
                    gameState.bullets.splice(i, 1);
                    if (p.health <= 0) {
                        // respawn after short delay? just delete for simplicity
                        delete gameState.players[pid];
                        // remove from inputMap as well? keep but they'll be dead
                    }
                    break;
                }
            }
        }

        // 4. broadcast full state to all connected clients
        const stateMsg = { type: 'state', state: gameState };
        for (let pid in connections) {
            try {
                connections[pid].send(stateMsg);
            } catch (e) {}
        }

        // render locally for host (use same gameState)
        renderGame();

        animationFrame = requestAnimationFrame(hostGameLoop);
    }

    function createBullet(ownerId, aimX, aimY) {
        const player = gameState.players[ownerId];
        if (!player) return;
        const dx = aimX - player.x;
        const dy = aimY - player.y;
        const len = Math.hypot(dx, dy);
        if (len < 0.001) return;
        const vx = (dx / len) * BULLET_SPEED;
        const vy = (dy / len) * BULLET_SPEED;
        gameState.bullets.push({
            x: player.x,
            y: player.y,
            vx, vy,
            ownerId: ownerId
        });
    }

    // --------------------------------------------------------------
    //  RENDERING (used by host and clients)
    // --------------------------------------------------------------
    function renderGame() {
        ctx.clearRect(0, 0, 800, 450);
        // draw grid (survive.io style)
        ctx.strokeStyle = '#3f494e';
        ctx.lineWidth = 1;
        for (let i = 0; i < 800; i += 40) {
            ctx.beginPath();
            ctx.strokeStyle = '#354044';
            ctx.lineWidth = 0.5;
            ctx.moveTo(i, 0);
            ctx.lineTo(i, 450);
            ctx.stroke();
        }
        for (let i = 0; i < 450; i += 40) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(800, i);
            ctx.stroke();
        }

        // bullets
        ctx.shadowColor = 'white';
        ctx.shadowBlur = 6;
        for (let b of gameState.bullets) {
            ctx.beginPath();
            ctx.fillStyle = '#ffcc00';
            ctx.arc(b.x, b.y, BULLET_RADIUS, 0, 2*Math.PI);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        // players
        for (let pid in gameState.players) {
            const p = gameState.players[pid];
            if (p.health <= 0) continue;
            // draw circle
            ctx.beginPath();
            ctx.fillStyle = p.color || '#44aaff';
            ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, 2*Math.PI);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();

            // health bar
            ctx.fillStyle = '#db2b2b';
            ctx.fillRect(p.x-20, p.y-30, 40, 6);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(p.x-20, p.y-30, 40 * (p.health/100), 6);

            // ID label
            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px monospace';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 4;
            ctx.fillText(pid.slice(0,5), p.x-20, p.y-38);
            ctx.shadowBlur = 0;
        }

        // local aim indicator (crosshair)
        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.moveTo(mouseX-10, mouseY);
        ctx.lineTo(mouseX+10, mouseY);
        ctx.moveTo(mouseX, mouseY-10);
        ctx.lineTo(mouseX, mouseY+10);
        ctx.stroke();
    }

    // --------------------------------------------------------------
    //  CLIENT SIDE: send input to host, receive state and render
    // --------------------------------------------------------------
    function startClient(hostId) {
        if (!peer) initializePeer();
        isHost = false;
        hostPeerId = hostId;

        // wait for peer open then connect
        const tryConnect = () => {
            if (!peer || !myPeerId) return setTimeout(tryConnect, 200);
            const conn = peer.connect(hostId);
            conn.on('open', () => {
                localConnection = conn;
                statusDiv.innerText = `🟢 connected to host ${hostId.slice(0,8)}`;
                addChatMessage('system', 'Joined streamer room. Waiting for state...');

                conn.on('data', (data) => {
                    if (data.type === 'state') {
                        gameState = data.state;
                    }
                });
                conn.on('close', () => {
                    statusDiv.innerText = '🔴 disconnected from host';
                });

                // start sending input continuously
                function sendInputLoop() {
                    if (!conn || conn.open === false) return;
                    if (conn.open) {
                        conn.send({
                            type: 'input',
                            left: inputState.left,
                            right: inputState.right,
                            up: inputState.up,
                            down: inputState.down,
                            aimX: inputState.aimX,
                            aimY: inputState.aimY,
                            shoot: inputState.shoot
                        });
                    }
                    requestAnimationFrame(sendInputLoop);
                }
                sendInputLoop();
            });
            conn.on('error', (e) => console.warn);
        };
        tryConnect();

        // client only renders (no simulation)
        function clientRenderLoop() {
            renderGame();
            animationFrame = requestAnimationFrame(clientRenderLoop);
        }
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(clientRenderLoop);
    }

    // --------------------------------------------------------------
    //  UI EVENT LISTENERS
    // --------------------------------------------------------------
    document.getElementById('hostBtn').addEventListener('click', () => {
        const hostId = document.getElementById('hostIdInput').value.trim() || 'streamer' + Math.floor(Math.random()*1000);
        if (peer) peer.destroy();
        isHost = true;
        inputMap = {}; // fresh
        gameState = { players: {}, bullets: [] };
        // add host player
        initializePeer(hostId);
    });

    document.getElementById('joinBtn').addEventListener('click', () => {
        const joinId = document.getElementById('joinIdInput').value.trim();
        if (!joinId) return;
        if (peer) peer.destroy();
        isHost = false;
        gameState = { players: {}, bullets: [] };
        initializePeer(); // random peer id for viewer
        // after open, we connect, but we need to wait for open
        const waitAndJoin = setInterval(() => {
            if (myPeerId) {
                clearInterval(waitAndJoin);
                startClient(joinId);
            }
        }, 200);
    });

    // mouse tracking for aim / shoot
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        mouseX = (e.clientX - rect.left) * scaleX;
        mouseY = (e.clientY - rect.top) * scaleY;
        mouseX = Math.min(800, Math.max(0, mouseX));
        mouseY = Math.min(450, Math.max(0, mouseY));
        inputState.aimX = mouseX;
        inputState.aimY = mouseY;
    });

    canvas.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
            mouseDown = true;
            inputState.shoot = true;
        }
    });
    window.addEventListener('mouseup', (e) => {
        if (e.button === 0) {
            mouseDown = false;
            inputState.shoot = false;
        }
    });

    window.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === 'w' || key === 'W') inputState.up = true;
        if (key === 's' || key === 'S') inputState.down = true;
        if (key === 'a' || key === 'A') inputState.left = true;
        if (key === 'd' || key === 'D') inputState.right = true;
        e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
        const key = e.key;
        if (key === 'w' || key === 'W') inputState.up = false;
        if (key === 's' || key === 'S') inputState.down = false;
        if (key === 'a' || key === 'A') inputState.left = false;
        if (key === 'd' || key === 'D') inputState.right = false;
        e.preventDefault();
    });

    // initial render (while disconnected)
    renderGame();
})();
</script>
</body>
</html>
