<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>programa con nodos · juego visual</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a2639 0%, #0d1b2a 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        .game-wrapper {
            background: #1e2a3a;
            border-radius: 3rem 3rem 2rem 2rem;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.05);
            padding: 2rem 2rem 2rem 2rem;
        }
        .canvas-container {
            position: relative;
            width: 920px;
            height: 520px;
            background: #14212b;
            border-radius: 2.5rem;
            box-shadow: inset 0 5px 8px #0f1a22, 0 10px 18px #03070c;
            border: 1px solid #3d5a73;
        }
        #nodeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .nodes-layer {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 20;
        }
        .node {
            position: absolute;
            width: 90px;
            height: 90px;
            background: #2e3b4e;
            background: radial-gradient(circle at 25% 25%, #4f6d7d, #26394b);
            border-radius: 30px 30px 25px 25px;
            border: 2px solid #6c8b9f;
            box-shadow: 0 8px 0 #0e1a24, 0 12px 18px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 2px 3px black;
            transform: translate(-50%, -50%);
            transition: box-shadow 0.1s, border-color 0.1s;
            cursor: pointer;
            z-index: 30;
        }
        .node-label {
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 40px;
            font-size: 12px;
            letter-spacing: 0.5px;
            border: 1px solid #b9d8e9;
            box-shadow: inset 0 1px 3px black;
        }
        .port {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f5e56b;
            background: radial-gradient(circle at 30% 30%, #ffd966, #d4a017);
            border: 3px solid #fcf3cf;
            box-shadow: 0 0 0 1px #1f3a4b, 0 4px 6px black;
            transition: transform 0.15s, background 0.1s, border-color 0.1s;
            cursor: crosshair;
            z-index: 50;
        }
        .port.input-port {
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
        }
        .port.output-port {
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
        }
        .port.active-source {
            background: radial-gradient(circle at 30% 30%, #b5e6ff, #3b9eff);
            border-color: white;
            transform: translateY(-50%) scale(1.25);
            box-shadow: 0 0 18px cyan;
        }
        .port:hover {
            transform: translateY(-50%) scale(1.2);
            border-color: #ffeeaa;
            background: #ffe570;
        }
        .node[data-type="0"] .node-label { background: #3f7e4c; }  /* start */
        .node[data-type="9"] .node-label { background: #b13e3e; }  /* end */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
            align-items: center;
        }
        button {
            background: #3d5f7a;
            border: none;
            border-bottom: 5px solid #1d3140;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px 36px;
            border-radius: 60px;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0e1f2b, 0 10px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.08s linear;
            text-transform: uppercase;
        }
        button:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
            box-shadow: 0 3px 0 #0e1f2b, 0 8px 12px black;
        }
        .message {
            background: #26323f;
            border-radius: 40px;
            padding: 14px 30px;
            min-width: 240px;
            text-align: center;
            color: #d9edff;
            font-size: 1.2rem;
            font-weight: 600;
            border: 1px solid #608a9f;
            box-shadow: inset 0 2px 5px #0d181f;
        }
        .instruction {
            color: #bbd8f0;
            text-align: center;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: 400;
            text-shadow: 0 2px 3px black;
        }
        .instruction span {
            display: inline-block;
            background: #2e4d3e;
            padding: 3px 12px;
            border-radius: 30px;
            margin: 0 5px;
            border: 1px solid #9fc9b0;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="canvas-container" id="canvasContainer">
        <canvas id="nodeCanvas" width="920" height="520"></canvas>
        <div class="nodes-layer" id="nodesLayer"></div>
    </div>

    <div class="control-panel">
        <button id="resetBtn">⟲ reset</button>
        <div class="message" id="gameMessage">⚡ conecta nodos</div>
        <button id="checkBtn">✓ comprobar</button>
    </div>
    <div class="instruction">
        <span>⚪ salida (dcha)</span> → <span>⚪ entrada (izq)</span>  ·  recorre todos los nodos del 0 al 9
    </div>
</div>

<script>
    (function() {
        // --- configuración: 10 nodos con nombres simpáticos
        const nodeNames = [
            "🏁 START",      // 0
            "⬆️ MOVE",       // 1
            "🔄 TURN",       // 2
            "🔁 LOOP",       // 3
            "❓ IF",         // 4
            "📦 VAR",        // 5
            "➕ ADD",        // 6
            "➖ SUB",        // 7
            "🖨️ PRINT",      // 8
            "🎯 END"         // 9
        ];

        const container = document.getElementById('nodesLayer');
        const canvas = document.getElementById('nodeCanvas');
        const ctx = canvas.getContext('2d');
        const messageDiv = document.getElementById('gameMessage');

        // Posiciones de los nodos (en círculo)
        const centerX = 460, centerY = 260, radius = 200;
        const nodePositions = [];
        for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * 2 * Math.PI - Math.PI / 2; // empezar arriba
            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);
            nodePositions.push({ x, y });
        }

        // Almacén de conexiones: { from: index, to: index }
        let connections = [];

        // Modo conexión: nodo fuente (output seleccionado)
        let sourceNodeIndex = null;          // índice del nodo cuyo output hemos clickado

        // ---- crear los nodos visuales y sus puertos
        function buildNodes() {
            container.innerHTML = ''; // limpiar
            for (let i = 0; i < 10; i++) {
                const pos = nodePositions[i];
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'node';
                nodeDiv.setAttribute('data-type', i);
                nodeDiv.setAttribute('data-index', i);
                nodeDiv.style.left = pos.x + 'px';
                nodeDiv.style.top = pos.y + 'px';

                // label
                const labelSpan = document.createElement('div');
                labelSpan.className = 'node-label';
                labelSpan.textContent = nodeNames[i];
                nodeDiv.appendChild(labelSpan);

                // input port (izquierdo)
                const inputPort = document.createElement('div');
                inputPort.className = 'port input-port';
                inputPort.setAttribute('data-port', 'input');
                inputPort.setAttribute('data-node', i);
                nodeDiv.appendChild(inputPort);

                // output port (derecho)
                const outputPort = document.createElement('div');
                outputPort.className = 'port output-port';
                outputPort.setAttribute('data-port', 'output');
                outputPort.setAttribute('data-node', i);
                nodeDiv.appendChild(outputPort);

                container.appendChild(nodeDiv);
            }
        }
        buildNodes();

        // ---- dibujar líneas en canvas
        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (connections.length === 0) return;

            ctx.lineWidth = 6;
            ctx.strokeStyle = '#b7e0ff';
            ctx.shadowColor = '#5dc9ff';
            ctx.shadowBlur = 12;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            for (let conn of connections) {
                const from = nodePositions[conn.from];
                const to = nodePositions[conn.to];
                if (!from || !to) continue;

                // desplazar ligeramente para que empiece desde el borde del puerto
                const startX = from.x + 40;  // lado derecho del nodo (aprox)
                const startY = from.y;
                const endX = to.x - 40;       // lado izquierdo del nodo
                const endY = to.y;

                // curva sencilla con control points
                ctx.beginPath();
                const cp1x = startX + (endX - startX) * 0.3;
                const cp1y = startY - 15;
                const cp2x = endX - (endX - startX) * 0.3;
                const cp2y = endY + 15;
                ctx.moveTo(startX, startY);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
                ctx.strokeStyle = '#b7e0ff';
                ctx.stroke();

                // flechita en el extremo (triángulo)
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#feeb85';
                ctx.strokeStyle = '#b3771e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                const angle = Math.atan2(endY - cp2y, endX - cp2x); // dirección aproximada
                const arrowSize = 16;
                const ax = endX - 8 * Math.cos(angle);
                const ay = endY - 8 * Math.sin(angle);
                ctx.moveTo(ax, ay);
                ctx.lineTo(ax - arrowSize * 0.5 * Math.cos(angle - 0.8), ay - arrowSize * 0.5 * Math.sin(angle - 0.8));
                ctx.lineTo(ax - arrowSize * 0.5 * Math.cos(angle + 0.8), ay - arrowSize * 0.5 * Math.sin(angle + 0.8));
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        // ---- actualizar tras cambios en connections
        function redraw() {
            drawLines();
        }

        // ---- resetear todas las conexiones
        function resetConnections() {
            connections = [];
            sourceNodeIndex = null;
            removeActiveClassFromPorts();
            redraw();
            messageDiv.textContent = '⚡ conecta nodos';
        }

        // ---- eliminar clase active-source de todos los puertos
        function removeActiveClassFromPorts() {
            document.querySelectorAll('.port.active-source').forEach(p => {
                p.classList.remove('active-source');
            });
        }

        // ---- crear o reemplazar conexión (manteniendo máximo 1 in/out)
        function setConnection(fromIdx, toIdx) {
            if (fromIdx === toIdx) {
                sourceNodeIndex = null;
                removeActiveClassFromPorts();
                return;
            }

            // eliminar cualquier conexión existente que salga de 'fromIdx' o que llegue a 'toIdx'
            connections = connections.filter(c => c.from !== fromIdx && c.to !== toIdx);

            // añadir nueva
            connections.push({ from: fromIdx, to: toIdx });
            redraw();

            // desactivar modo fuente
            sourceNodeIndex = null;
            removeActiveClassFromPorts();
        }

        // ---- comprobar si forman un camino hamiltoniano de 0 a 9
        function checkVictory() {
            // construir arreglos de grado
            const out = Array(10).fill(null);
            const in_ = Array(10).fill(null);

            for (let c of connections) {
                out[c.from] = c.to;
                in_[c.to] = c.from;
            }

            // reglas básicas: nodo 0 no debe tener entrada, nodo 9 no debe tener salida
            if (in_[0] !== null) {
                messageDiv.textContent = '❌ START no puede tener entrada';
                return;
            }
            if (out[9] !== null) {
                messageDiv.textContent = '❌ END no puede tener salida';
                return;
            }

            // cada nodo debe tener <=1 in y out (ya garantizado por nuestro filtro, pero puede haber ciclos raros)
            // recorrer desde 0
            let visited = new Set();
            let current = 0;
            let path = [];

            while (current !== null && !visited.has(current)) {
                visited.add(current);
                path.push(current);
                current = out[current];
            }

            if (visited.size === 10 && path[path.length-1] === 9) {
                messageDiv.textContent = '✅ 🎉 PROGRAMA CORRECTO! has conectado todos';
            } else {
                // diagnósticos amigables
                if (!visited.has(0)) messageDiv.textContent = '❌ START no está conectado';
                else if (visited.has(9) && visited.size < 10) messageDiv.textContent = `⚠️ camino incompleto (${visited.size}/10 nodos)`;
                else if (!visited.has(9)) messageDiv.textContent = '❌ no se alcanza END';
                else messageDiv.textContent = '❌ aún no es un camino único';
            }
        }

        // ---- manejadores de eventos en puertos
        function attachPortListeners() {
            document.querySelectorAll('.port').forEach(port => {
                port.removeEventListener('mousedown', portHandler);
                port.addEventListener('mousedown', portHandler);
            });
        }

        function portHandler(e) {
            e.stopPropagation();  // evitar que el documento lo cancele
            const port = e.currentTarget;
            const nodeIdx = parseInt(port.getAttribute('data-node'), 10);
            const portType = port.getAttribute('data-port');

            if (portType === 'output') {
                // activar modo conexión desde este nodo
                // limpiar otros sources
                removeActiveClassFromPorts();
                port.classList.add('active-source');
                sourceNodeIndex = nodeIdx;
            } else if (portType === 'input') {
                // si hay un source activo, intentar conectar
                if (sourceNodeIndex !== null && sourceNodeIndex !== nodeIdx) {
                    setConnection(sourceNodeIndex, nodeIdx);
                } else {
                    // click en input sin source -> quizá cancelar
                    if (sourceNodeIndex !== null) {
                        removeActiveClassFromPorts();
                        sourceNodeIndex = null;
                    }
                }
            }
        }

        // cancelar modo source si se hace clic fuera de puerto
        document.addEventListener('mousedown', function(e) {
            if (!e.target.classList.contains('port')) {
                removeActiveClassFromPorts();
                sourceNodeIndex = null;
            }
        });

        // actualizar listeners cada vez que se regeneren nodos (por si acaso, pero nosotros no regeneramos)
        // sin embargo los puertos son estáticos tras buildNodes, así que llamar una vez
        attachPortListeners();

        // ---- botones
        document.getElementById('resetBtn').addEventListener('click', () => {
            resetConnections();
        });

        document.getElementById('checkBtn').addEventListener('click', () => {
            checkVictory();
        });

        // dibujo inicial (sin líneas)
        redraw();

        // opcional: redibujar si cambia tamaño (no necesario, pero por si acaso)
        window.addEventListener('resize', () => {}); // nada

        // pequeños ajustes: recalcar que el nodo 0 y 9 tienen colores especiales en CSS

        // Exponer reset por si se quiere usar desde consola, no necesario
        // también añadir tecla de escape para cancelar source
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                removeActiveClassFromPorts();
                sourceNodeIndex = null;
            }
        });

        // mejora: si se hace clic en un nodo (fondo) también cancelar source
        document.querySelectorAll('.node').forEach(node => {
            node.addEventListener('mousedown', (e) => {
                // si el clic no fue en un puerto, cancelar source
                if (!e.target.classList.contains('port')) {
                    removeActiveClassFromPorts();
                    sourceNodeIndex = null;
                }
            });
        });

        // mensaje inicial
        messageDiv.textContent = '⚡ 10 nodos: conecta START → ... → END';
    })();
</script>
</body>
</html>
