<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Roblox P2P</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #gui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px; pointer-events: none; }
        #conn-ui { position: absolute; bottom: 10px; left: 10px; background: white; padding: 10px; display: flex; gap: 5px; pointer-events: all; }
    </style>
</head>
<body>

<div id="gui">
    <b>Controles:</b> WASD para mover | Espacio para saltar<br>
    <b>Editor:</b> Click Izquierdo para colocar Bloque (Stud)<br>
    <small id="my-id">Cargando ID...</small>
</div>

<div id="conn-ui">
    <input type="text" id="remote-id" placeholder="ID del amigo">
    <button onclick="connectToPeer()">Conectar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

<script>
// --- CONFIGURACIÓN INICIAL ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// Suelo (Baseplate)
const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x888888);
scene.add(gridHelper);
const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({color: 0x3a3a3a}));
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// --- CREAR PERSONAJE ESTILO ROBLOX ---
function createAvatar(color = 0x00AAFF) {
    const group = new THREE.Group();
    // Torso
    const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.5), new THREE.MeshPhongMaterial({color}));
    torso.position.y = 1.6;
    group.add(torso);
    // Cabeza
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshPhongMaterial({color: 0xffdbac}));
    head.position.y = 2.6;
    group.add(head);
    // Piernas
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.45, 1, 0.45), new THREE.MeshPhongMaterial({color: 0x111111}));
    legL.position.set(-0.25, 0.5, 0);
    group.add(legL);
    const legR = legL.clone();
    legR.position.x = 0.25;
    group.add(legR);
    return group;
}

const player = createAvatar(0xeeee00);
scene.add(player);
camera.position.set(0, 5, 10);

// --- MOVIMIENTO Y FÍSICA ---
let velocityY = 0;
let isGrounded = true;
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

// --- EDITOR DE MAPAS (STUDS) ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('mousedown', (e) => {
    if(e.target.tagName !== 'CANVAS') return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects([floor, ...scene.children.filter(obj => obj.isBlock)]);
    
    if (intersects.length > 0) {
        const p = intersects[0].point;
        const block = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({color: 0x888888}));
        // Snap to grid (Studs)
        block.position.set(Math.round(p.x), Math.round(p.y + 0.5), Math.round(p.z));
        block.isBlock = true;
        scene.add(block);
        // Aquí enviarías el bloque al otro jugador vía P2P
    }
});

// --- LÓGICA MULTIJUGADOR P2P ---
const peer = new Peer();
let conn;
const remotePlayers = {};

peer.on('open', id => {
    document.getElementById('my-id').innerText = "Tu ID: " + id;
});

peer.on('connection', c => {
    conn = c;
    setupChat();
});

function connectToPeer() {
    const id = document.getElementById('remote-id').value;
    conn = peer.connect(id);
    setupChat();
}

function setupChat() {
    conn.on('data', data => {
        if(data.type === 'move') {
            if(!remotePlayers[conn.peer]) {
                remotePlayers[conn.peer] = createAvatar(0xff0000);
                scene.add(remotePlayers[conn.peer]);
            }
            remotePlayers[conn.peer].position.set(data.x, data.y, data.z);
        }
    });
}

// --- BUCLE DE JUEGO ---
function animate() {
    requestAnimationFrame(animate);

    // Movimiento
    const speed = 0.15;
    if (keys['KeyW']) player.position.z -= speed;
    if (keys['KeyS']) player.position.z += speed;
    if (keys['KeyA']) player.position.x -= speed;
    if (keys['KeyD']) player.position.x += speed;

    // Salto
    if (keys['Space'] && isGrounded) {
        velocityY = 0.2;
        isGrounded = false;
    }
    
    player.position.y += velocityY;
    if (player.position.y > 0) {
        velocityY -= 0.01; // Gravedad
    } else {
        player.position.y = 0;
        velocityY = 0;
        isGrounded = true;
    }

    // Cámara sigue al jugador
    camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 5, player.position.z + 10), 0.1);
    camera.lookAt(player.position);

    // Enviar posición por P2P
    if(conn && conn.open) {
        conn.send({type: 'move', x: player.position.x, y: player.position.y, z: player.position.z});
    }

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
